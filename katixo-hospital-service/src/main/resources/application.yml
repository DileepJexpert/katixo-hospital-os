spring:
  application:
    name: katixo-hospital-service
  datasource:
    url: jdbc:postgresql://localhost:5432/katixo_hospital
    username: katixo
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_schema: hospital
        format_sql: true
        use_sql_comments: true
  flyway:
    enabled: true
    schemas: hospital,audit
    locations: classpath:db/migration
    out-of-order: false
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 2000ms
      jedis:
        pool:
          max-active: 20
          max-idle: 10
  elasticsearch:
    uris: http://localhost:9200
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      acks: all
      retries: 3
    consumer:
      group-id: hospital-service

server:
  port: 8081

logging:
  level:
    com.katixo.hospital: DEBUG
    org.springframework.security: DEBUG
    org.springframework.web: INFO
  pattern:
    console: "%d{HH:mm:ss.SSS} %-5level %logger{36} - %msg%n"

springdoc:
  api-docs:
    path: /v1/api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true

katixo:
  erp:
    base-url: http://localhost:8080
    service-token: ${ERP_SERVICE_TOKEN:dev-token}
    connect-timeout: 5000
    read-timeout: 10000
  security:
    jwt-secret: ${JWT_SECRET:dev-secret-key-min-256-bits-long-for-testing}
    jwt-expiration: 86400000
  tenant:
    default-branch-id: ${DEFAULT_BRANCH_ID:1}
