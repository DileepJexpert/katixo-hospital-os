spring:
  application:
    name: katixo-hospital-service
  datasource:
    url: jdbc:postgresql://localhost:5432/katixo_hospital
    username: katixo
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
  jpa:
    # OSIV would open the Hibernate session (and pin its tenant schema) before
    # the controller/filter binds TenantContext. Sessions must open inside the
    # transaction, after the tenant is known.
    open-in-view: false
    hibernate:
      # Schema is selected per request (schema-per-tenant); validation/DDL is
      # handled by Flyway per tenant schema, never by Hibernate.
      ddl-auto: none
    properties:
      hibernate:
        format_sql: true
        use_sql_comments: true
  flyway:
    # Disabled: migrations run programmatically (TenantMigrationService) —
    # platform schema once, then every tenant schema.
    enabled: false
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 2000ms
      jedis:
        pool:
          max-active: 20
          max-idle: 10
  elasticsearch:
    uris: http://localhost:9200
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      acks: all
      retries: 3
    consumer:
      group-id: hospital-service

server:
  port: 8081

logging:
  level:
    com.katixo.hospital: DEBUG
    org.springframework.security: DEBUG
    org.springframework.web: INFO
  pattern:
    console: "%d{HH:mm:ss.SSS} %-5level %logger{36} - %msg%n"

springdoc:
  api-docs:
    path: /v1/api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true

katixo:
  security:
    jwt-secret: ${JWT_SECRET:dev-secret-key-min-256-bits-long-for-testing}
    jwt-expiration: 86400000
  tenant:
    default-branch-id: ${DEFAULT_BRANCH_ID:1}
    demo:
      # Auto-provisions a demo tenant schema on startup (local dev only —
      # disable in prod; real tenants come via POST /api/v1/platform/tenants).
      enabled: ${DEMO_TENANT_ENABLED:true}
      tenant-id: demo-tenant
